name: CI (py-api · Python)

# 单后端 py-api 独立 CI（2026-06-25）
# 范围：
# - ruff（lint）
# - mypy（类型检查）
# - pytest（74 case）
# - docker build test（验证镜像可构建）

on:
  push:
    branches: [main]
    paths:
      - 'apps/py-api/**'
      - 'docker-compose.yml'
      - 'deploy.sh'
      - '.github/workflows/ci-py-api.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/py-api/**'
  workflow_dispatch:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/py-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'apps/py-api/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (typecheck)
        # mypy 严格检查；忽略缺 stub 的第三方库（langchain 等）
        run: |
          mypy app/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --follow-imports=silent \
            --show-error-codes \
            2>&1 | tee mypy.log
          # mypy 不强制 0 error（商用项目允许渐进收紧）
          if grep -q "error:" mypy.log; then
            echo "::warning::mypy reported errors (see mypy.log)"
          fi

      - name: Pytest (74 case)
        # CI 用 postgres/redis service container 跑需要外部依赖的 case
        # 当前 74/74 case 都能在 mock 环境跑通（无需真依赖）
        run: python -m pytest tests/ -v --tb=short --cov=app --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: py-api-coverage
          path: apps/py-api/coverage.xml
          retention-days: 7

  docker-build-test:
    runs-on: ubuntu-latest
    needs: lint-type-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build py-api image (cache disabled for verification)
        # 只 build，不 push（验证 Dockerfile 可构建）
        # context 必须是 monorepo 根（apps/py-api/Dockerfile 假设 COPY apps/py-api/...）
        run: |
          docker build \
            -f apps/py-api/Dockerfile \
            -t interview-py-api:test \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            .

      - name: Smoke test (image healthcheck)
        run: |
          # 启动容器（无外部依赖），验证健康检查通过
          docker run -d \
            --name py-api-smoke \
            -e NODE_ENV=production \
            -e JWT_SECRET=ci_test_secret_at_least_32_characters_long_xxxxxxxx \
            -e QWEN_API_KEY=sk-test-placeholder \
            -e DEEPSEEK_API_KEY=sk-test-placeholder \
            -e POSTGRES_HOST=localhost \
            -e REDIS_HOST=localhost \
            -e MILVUS_HOST=localhost \
            -e QDRANT_URL=http://localhost:6333 \
            -p 3002:3002 \
            interview-py-api:test

          # 等待启动
          for i in $(seq 1 30); do
            if curl -s http://localhost:3002/api/health 2>/dev/null | grep -q "ok"; then
              echo "✓ py-api is healthy"
              break
            fi
            sleep 2
          done

          curl -s http://localhost:3002/api/health
          docker logs py-api-smoke | tail -20

      - name: Cleanup
        if: always()
        run: docker rm -f py-api-smoke 2>/dev/null || true

  # api-legacy-test 已在 ci-api.yml 替代（apps/api 是 NestJS 默认）
  # 2026-06-26 架构回退后，apps/api-legacy/ 已重命名为 apps/api/
  # NestJS 测试 + E2E 接口验证见 .github/workflows/ci-api.yml

  web-test:
    runs-on: ubuntu-latest
    # pnpm workspace 在 monorepo 根，working-directory 不能切到 apps/web
    # （否则 pnpm install --frozen-lockfile 找不到 root pnpm-lock.yaml）
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        # 不带 cache（cache:'pnpm' + cache-dependency-path 在 GH runner fail 高发，去掉）
        # pnpm install 自身的 store 缓存就够
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies (monorepo root)
        run: pnpm install --frozen-lockfile

      - name: Vitest (59 case, @interview-agent/web)
        run: pnpm --filter @interview-agent/web exec vitest run --reporter=verbose

  ci-summary:
    runs-on: ubuntu-latest
    # 2026-06-26 架构回退后，apps/api-legacy 已重命名为 apps/api
    # NestJS 测试见 .github/workflows/ci-api.yml；ci-py-api.yml 只管 py-api + web
    needs: [lint-type-test, docker-build-test, web-test]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| lint-type-test | ${{ needs.lint-type-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| docker-build-test | ${{ needs.docker-build-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| web-test | ${{ needs.web-test.result }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.lint-type-test.result }}" != "success" ] || \
             [ "${{ needs.docker-build-test.result }}" != "success" ] || \
             [ "${{ needs.web-test.result }}" != "success" ]; then
            exit 1
          fi