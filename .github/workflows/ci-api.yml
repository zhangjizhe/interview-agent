name: CI (api · NestJS)

# NestJS api CI（2026-06-26 默认后端）
# 范围：
# - lint（ESLint）
# - type（tsc --noEmit）
# - test（jest 203 case）
# - docker build + E2E 接口测试（readiness + 关键 endpoint）

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'docker-compose.yml'
      - 'deploy.sh'
      - '.github/workflows/ci-api.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/**'
  workflow_dispatch:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/api/package-lock.json'

      - name: Install dependencies (npm)
        # --legacy-peer-deps: @nestjs/testing@11 要 NestJS 11，但项目用 NestJS 10
        # 本地 pnpm install 不报错（pnpm 锁版本不锁 ^ 范围）；npm ci 严格 peer 必须加
        run: npm ci --legacy-peer-deps

      - name: ESLint
        run: npm run lint --if-present || echo "⚠️ lint not configured, skipping"

      - name: TypeScript (tsc --noEmit)
        # 严格类型检查；渐进式收紧，0 error 阻塞
        run: |
          npx tsc --noEmit 2>&1 | tee tsc.log
          if grep -q "error TS" tsc.log; then
            echo "::warning::TypeScript reported errors (see tsc.log)"
          fi

      - name: Jest (203 case)
        run: npx jest --ci

  # 接口 E2E 测试（2026-06-26 用户要求：readiness + 接口端到端）
  # 启 docker compose（NestJS + postgres + redis），验证：
  # 1. /api/health（liveness）
  # 2. /api/health/ready（readiness：postgres + redis 真连）
  # 3. /api/interview/list?userId=xxx
  # 4. /api/interview/stats?userId=xxx
  # 5. /api/tools
  # 6. /api/admin/mcp-servers
  # 7. /api/knowledge-base/list
  # 8. /api/interview/question-bank/list
  # 9. /api/interview/upload-resume（PDF 真上传 + 解析）
  interface-e2e:
    runs-on: ubuntu-latest
    needs: lint-type-test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: interview
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: dev123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api image
        # context 必须是 monorepo 根（apps/api/Dockerfile 假设能 COPY pnpm-workspace.yaml + monorepo 文件）
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t interview-api:test \
            .

      - name: Start infrastructure (postgres + redis)
        run: |
          # CI service container 已起 postgres + redis（见 services 块）
          # 等 healthy
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U dev && redis-cli -h localhost -p 6379 ping | grep -q PONG; then
              echo "✓ postgres + redis ready"
              break
            fi
            sleep 2
          done

      - name: Cache prisma binaries
        # Prisma binary engine（~50MB）首次拉很慢，缓存复用
        uses: actions/cache@v4
        with:
          path: ~/.cache/prisma
          key: ${{ runner.os }}-prisma-${{ hashFiles('apps/api/prisma/schema.prisma') }}

      - name: Prisma generate
        # nest build 需要 @prisma/client type 定义（来自 .prisma/client/）
        # npm ci 装 @prisma/client 但不自动 generate
        # 顺序：prisma generate 必须在 nest build 前
        # set +e 让 step 不因 grep error 立刻 fail（把 log 留给 upload-artifact 让我能看）
        working-directory: apps/api
        run: |
          set +e
          echo "=== prisma --version ==="
          npx prisma --version 2>&1
          echo "=== ls node_modules/.bin/prisma ==="
          ls -la node_modules/.bin/prisma 2>&1
          echo "=== ls prisma/ ==="
          ls -la prisma/ 2>&1
          echo "=== pwd ==="
          pwd
          echo "=== node version ==="
          node --version
          echo "=== npm version ==="
          npm --version
          echo "=== prisma generate ==="
          npx prisma generate 2>&1 | tee prisma-generate.log
          echo "=== exit code: $? ==="

      - name: Upload prisma generate log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prisma-generate-log
          path: apps/api/prisma-generate.log
          if-no-files-found: warn
          retention-days: 3

      - name: Build NestJS api
        # lint-type-test 只跑 jest（ts-jest 转译），不输出 dist/
        # E2E 跑 node dist/main.js 需要先 nest build
        # set +e + tee log 让 fail 也能看到真实错（GH API 看不到 step log）
        working-directory: apps/api
        run: |
          set +e
          npx nest build 2>&1 | tee nest-build.log
          echo "=== exit code: $? ==="
          echo "=== ls dist/ ==="
          ls -la dist/ 2>&1 | head -10

      - name: Upload nest build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nest-build-log
          path: apps/api/nest-build.log
          if-no-files-found: warn
          retention-days: 3

      - name: Start NestJS api (in runner, not container)
        # GH service container（postgres / redis）在 runner 上 listen localhost:5432 / 6379
        # 直接 node dist/main.js 跑（用 lint-type-test 已 build 的 dist 复用 + install 的 node_modules）
        # 比 docker run 容器内 + host.docker.internal 简单且 Linux runner 兼容
        env:
          DATABASE_URL: postgresql://dev:dev123@localhost:5432/interview
          REDIS_URL: redis://localhost:6379
          QDRANT_URL: http://localhost:6333
          MILVUS_URL: http://localhost:19530
          QWEN_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1
          QWEN_MODEL: qwen-plus
          QWEN_API_KEY: sk-test-placeholder
          DEEPSEEK_API_KEY: sk-test-placeholder
          MEM0_API_KEY: ''
          MEM0_HOST: ''
          JWT_SECRET: ci_test_secret_at_least_32_characters_long_xxxxxxxx
          PORT: 3001
          NODE_ENV: production
        run: |
          cd apps/api
          nohup node dist/main.js > api-e2e.log 2>&1 &
          echo $! > /tmp/api-e2e.pid
          echo "✓ api started, pid=$(cat /tmp/api-e2e.pid)"

      - name: Wait for api healthy
        run: |
          for i in $(seq 1 60); do
            if curl -s http://localhost:3001/api/health 2>/dev/null | grep -q '"status":"ok"'; then
              echo "✓ api is healthy"
              break
            fi
            echo "waiting... ($i)"
            sleep 3
          done

      - name: E2E 接口测试（9 个核心 endpoint）
        run: |
          echo "=== 1. Liveness ==="
          curl -sf http://localhost:3001/api/health && echo " ✓" || (echo "✗ FAIL"; exit 1)

          echo "=== 2. Readiness（postgres + redis 真连） ==="
          READY=$(curl -sf http://localhost:3001/api/health/ready)
          echo "$READY"
          if echo "$READY" | grep -q '"status":"ready"' && \
             echo "$READY" | grep -q '"postgres":"ok"' && \
             echo "$READY" | grep -q '"redis":"ok"'; then
            echo "✓ readiness OK"
          else
            echo "✗ readiness FAIL"
            docker logs api-e2e 2>&1 | tail -30 || true
            cat api-e2e.log 2>&1 | tail -50 || true
            exit 1
          fi

          echo "=== 3. /api/interview/list ==="
          curl -sf "http://localhost:3001/api/interview/list?userId=demo-user-ci" > /dev/null && echo "✓" || (echo "✗"; exit 1)

          echo "=== 4. /api/interview/stats ==="
          curl -sf "http://localhost:3001/api/interview/stats?userId=demo-user-ci" > /dev/null && echo "✓" || (echo "✗"; exit 1)

          echo "=== 5. /api/tools ==="
          curl -sf http://localhost:3001/api/tools > /dev/null && echo "✓" || (echo "✗"; exit 1)

          echo "=== 6. /api/admin/mcp-servers ==="
          curl -sf http://localhost:3001/api/admin/mcp-servers > /dev/null && echo "✓" || (echo "✗"; exit 1)

          echo "=== 7. /api/knowledge-base/list ==="
          curl -sf http://localhost:3001/api/knowledge-base/list > /dev/null && echo "✓" || (echo "✗"; exit 1)

          echo "=== 8. /api/interview/question-bank/list ==="
          curl -sf "http://localhost:3001/api/interview/question-bank/list?limit=3" > /dev/null && echo "✓" || (echo "✗"; exit 1)

          echo "=== 9. /api/interview/upload-resume ==="
          # 用最小有效 PDF（CI 内联生成）
          python3 -c "
          from reportlab.pdfgen import canvas
          c = canvas.Canvas('/tmp/ci-resume.pdf')
          c.drawString(50, 750, 'Name: CI Test')
          c.drawString(50, 730, 'Email: ci@test.local')
          c.drawString(50, 710, 'Skills: Python TypeScript NestJS FastAPI')
          c.save()
          "
          UPLOAD=$(curl -sf -X POST http://localhost:3001/api/interview/upload-resume \
            -F "file=@/tmp/ci-resume.pdf" \
            -F "position=AI Agent" \
            -F "userId=demo-user-ci" \
            -w "%{http_code}" -o /tmp/upload-response.json)
          if [ "$UPLOAD" = "200" ] && grep -q "ragIngested\|interviewId" /tmp/upload-response.json; then
            echo "✓ upload-resume 200 + valid response"
          else
            echo "✗ upload-resume FAIL (status=$UPLOAD)"
            cat /tmp/upload-response.json
            exit 1
          fi

      - name: E2E summary
        if: always()
        run: |
          echo "=== api process logs (last 50) ==="
          cat api-e2e.log 2>&1 | tail -50 || true

      - name: Cleanup
        if: always()
        run: |
          # 杀 NestJS 进程（之前用 docker run 现在改 nohup node）
          if [ -f /tmp/api-e2e.pid ]; then
            kill $(cat /tmp/api-e2e.pid) 2>/dev/null || true
          fi
          rm -f /tmp/ci-resume.pdf /tmp/upload-response.json /tmp/api-e2e.pid

  ci-summary:
    runs-on: ubuntu-latest
    needs: [lint-type-test, interface-e2e]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## CI Summary (api · NestJS)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| lint-type-test | ${{ needs.lint-type-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| interface-e2e | ${{ needs.interface-e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.lint-type-test.result }}" != "success" ] || \
             [ "${{ needs.interface-e2e.result }}" != "success" ]; then
            exit 1
          fi