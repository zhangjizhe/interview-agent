server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Docker 解析 + 动态 backend（API 容器重启/健康检查
  resolver 127.0.0.11 valid=30s ipv6=off;

  # API 代理到 backend（NestJS 默认 · 2026-06-26 改回 api:3001）
  # 切 py-api：set $backend "http://py-api:3002" + 重 build web
  location /api/ {
    set $backend "http://api:3001";
    proxy_pass $backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # SSE 长连接
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    # API 未就绪时返回 JSON 错误页
    proxy_intercept_errors on;
    error_page 502 503 504 @api_error;
  }

  location @api_error {
    internal;
    default_type application/json;
    return 502 '{"statusCode":502,"message":"API 服务暂不可用，请稍后重试","timestamp":"$time_iso8601"}';
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
