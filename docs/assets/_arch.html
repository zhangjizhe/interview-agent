<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Architecture</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0e1116; color: #e6edf3; font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; padding: 0; }
  .frame { width: 1020px; padding: 20px 24px; background: #0e1116; }
  .title { font-size: 18px; font-weight: 700; color: #58a6ff; margin-bottom: 12px; }
  .subtitle { color: #8b949e; font-size: 11px; margin-bottom: 16px; }
  svg { display: block; }
</style>
</head>
<body>
<div class="frame">
  <div class="title">⚙️ Interview Agent · 3 层系统架构</div>
  <div class="subtitle">前端 Web SPA → 后端 NestJS API + LangGraph → 基础设施 7 容器 + 双模型</div>

  <svg viewBox="0 0 1000 540" xmlns="http://www.w3.org/2000/svg">
    <!-- ============ 3 层背景 ============ -->
    <rect x="0" y="0" width="1000" height="125" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
    <rect x="0" y="175" width="1000" height="195" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
    <rect x="0" y="420" width="1000" height="110" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>

    <!-- 层标签 -->
    <rect x="10" y="8" width="155" height="22" rx="4" fill="#58a6ff"/>
    <text x="87" y="23" text-anchor="middle" fill="#0e1116" font-size="12" font-weight="700">前端层 · Web SPA</text>

    <rect x="10" y="183" width="200" height="22" rx="4" fill="#d29922"/>
    <text x="110" y="198" text-anchor="middle" fill="#0e1116" font-size="12" font-weight="700">后端层 · NestJS + LangGraph</text>

    <rect x="10" y="428" width="240" height="22" rx="4" fill="#3fb950"/>
    <text x="130" y="443" text-anchor="middle" fill="#0e1116" font-size="12" font-weight="700">基础设施 · 7 容器 + 外部 SaaS</text>

    <!-- ============ 前端层节点 ============ -->
    <g font-family="-apple-system, sans-serif" font-size="11" fill="#e6edf3">
      <rect x="30" y="45" width="135" height="62" rx="6" fill="#1e3a5f" stroke="#58a6ff"/>
      <text x="97" y="68" text-anchor="middle" font-weight="600">HomePage</text>
      <text x="97" y="84" text-anchor="middle" fill="#8b949e" font-size="9">求职门户</text>
      <text x="97" y="97" text-anchor="middle" fill="#8b949e" font-size="9">React + Vite</text>

      <rect x="190" y="45" width="135" height="62" rx="6" fill="#1e3a5f" stroke="#58a6ff"/>
      <text x="257" y="68" text-anchor="middle" font-weight="600">InterviewPage</text>
      <text x="257" y="84" text-anchor="middle" fill="#8b949e" font-size="9">实时对话</text>
      <text x="257" y="97" text-anchor="middle" fill="#8b949e" font-size="9">SSE 流式</text>

      <rect x="350" y="45" width="135" height="62" rx="6" fill="#1e3a5f" stroke="#58a6ff"/>
      <text x="417" y="68" text-anchor="middle" font-weight="600">ReportPage</text>
      <text x="417" y="84" text-anchor="middle" fill="#8b949e" font-size="9">多维报告</text>
      <text x="417" y="97" text-anchor="middle" fill="#8b949e" font-size="9">雷达图 + 评分</text>

      <rect x="510" y="45" width="135" height="62" rx="6" fill="#1e3a5f" stroke="#58a6ff"/>
      <text x="577" y="68" text-anchor="middle" font-weight="600">QuestionBank</text>
      <text x="577" y="84" text-anchor="middle" fill="#8b949e" font-size="9">题库浏览</text>
      <text x="577" y="97" text-anchor="middle" fill="#8b949e" font-size="9">Milvus 检索</text>

      <rect x="670" y="45" width="135" height="62" rx="6" fill="#1e3a5f" stroke="#58a6ff"/>
      <text x="737" y="68" text-anchor="middle" font-weight="600">ToolsPage</text>
      <text x="737" y="84" text-anchor="middle" fill="#8b949e" font-size="9">工具箱</text>
      <text x="737" y="97" text-anchor="middle" fill="#8b949e" font-size="9">MCP 客户端</text>

      <rect x="830" y="45" width="135" height="62" rx="6" fill="#1e3a5f" stroke="#58a6ff"/>
      <text x="897" y="68" text-anchor="middle" font-weight="600">AdminMcp</text>
      <text x="897" y="84" text-anchor="middle" fill="#8b949e" font-size="9">MCP 管理</text>
      <text x="897" y="97" text-anchor="middle" fill="#8b949e" font-size="9">Registry 编辑</text>
    </g>

    <!-- 前端 → 后端 连线 -->
    <g stroke="#58a6ff" stroke-width="1.5" fill="none">
      <line x1="257" y1="107" x2="500" y2="220"/>
      <line x1="417" y1="107" x2="500" y2="220"/>
    </g>
    <text x="350" y="170" fill="#58a6ff" font-size="10" font-weight="600">HTTPS / SSE</text>

    <!-- ============ 后端层节点 ============ -->
    <g font-family="-apple-system, sans-serif" font-size="11" fill="#e6edf3">
      <rect x="30" y="220" width="160" height="58" rx="6" fill="#3d2914" stroke="#d29922"/>
      <text x="110" y="242" text-anchor="middle" font-weight="600">InterviewController</text>
      <text x="110" y="258" text-anchor="middle" fill="#8b949e" font-size="9">REST + SSE Endpoint</text>
      <text x="110" y="271" text-anchor="middle" fill="#8b949e" font-size="9">/api/interview/*</text>

      <rect x="210" y="220" width="160" height="58" rx="6" fill="#3d2914" stroke="#d29922"/>
      <text x="290" y="242" text-anchor="middle" font-weight="600">MultiAgentService</text>
      <text x="290" y="258" text-anchor="middle" fill="#8b949e" font-size="9">LangGraph 5 节点</text>
      <text x="290" y="271" text-anchor="middle" fill="#8b949e" font-size="9">问 / 评 / 追问 / 总结</text>

      <rect x="390" y="220" width="170" height="58" rx="6" fill="#3d2914" stroke="#d29922"/>
      <text x="475" y="242" text-anchor="middle" font-weight="600">LlmGateway</text>
      <text x="475" y="258" text-anchor="middle" fill="#8b949e" font-size="9">Provider 路由 · 自动熔断</text>
      <text x="475" y="271" text-anchor="middle" fill="#8b949e" font-size="9">3 段 cache + fallback</text>

      <rect x="580" y="220" width="155" height="58" rx="6" fill="#3d2914" stroke="#d29922"/>
      <text x="657" y="242" text-anchor="middle" font-weight="600">PromptCache</text>
      <text x="657" y="258" text-anchor="middle" fill="#8b949e" font-size="9">3 段前缀识别</text>
      <text x="657" y="271" text-anchor="middle" fill="#8b949e" font-size="9">cache_key 注入</text>

      <rect x="755" y="220" width="155" height="58" rx="6" fill="#3d2914" stroke="#d29922"/>
      <text x="832" y="242" text-anchor="middle" font-weight="600">SemanticCache</text>
      <text x="832" y="258" text-anchor="middle" fill="#8b949e" font-size="9">Qwen Embedding + Qdrant</text>
      <text x="832" y="271" text-anchor="middle" fill="#8b949e" font-size="9">黑白名单 · 阈值 0.92</text>

      <rect x="210" y="295" width="160" height="58" rx="6" fill="#3d2914" stroke="#d29922"/>
      <text x="290" y="317" text-anchor="middle" font-weight="600">Fallback Engine</text>
      <text x="290" y="333" text-anchor="middle" fill="#8b949e" font-size="9">永久错 disableProvider</text>
      <text x="290" y="346" text-anchor="middle" fill="#8b949e" font-size="9">临时错 fallback</text>

      <rect x="390" y="295" width="170" height="58" rx="6" fill="#3d2914" stroke="#d29922"/>
      <text x="475" y="317" text-anchor="middle" font-weight="600">SessionCostTracker</text>
      <text x="475" y="333" text-anchor="middle" fill="#8b949e" font-size="9">实时 token / cost 聚合</text>
      <text x="475" y="346" text-anchor="middle" fill="#8b949e" font-size="9">Redis Hash + Postgres</text>

      <rect x="580" y="295" width="155" height="58" rx="6" fill="#3d2914" stroke="#d29922"/>
      <text x="657" y="317" text-anchor="middle" font-weight="600">Langfuse Trace</text>
      <text x="657" y="333" text-anchor="middle" fill="#8b949e" font-size="9">sample 10% trace</text>
      <text x="657" y="346" text-anchor="middle" fill="#8b949e" font-size="9">50% span 观测</text>

      <rect x="755" y="295" width="155" height="58" rx="6" fill="#3d2914" stroke="#d29922"/>
      <text x="832" y="317" text-anchor="middle" font-weight="600">PostgresSaver</text>
      <text x="832" y="333" text-anchor="middle" fill="#8b949e" font-size="9">LangGraph 断点续跑</text>
      <text x="832" y="346" text-anchor="middle" fill="#8b949e" font-size="9">HITL 简历缺口</text>
    </g>

    <!-- 后端 → 基础设施 -->
    <g stroke="#d29922" stroke-width="1.5" fill="none">
      <line x1="475" y1="353" x2="100" y2="460"/>
      <line x1="475" y1="353" x2="270" y2="460"/>
      <line x1="657" y1="353" x2="440" y2="460"/>
      <line x1="475" y1="353" x2="610" y2="460"/>
    </g>
    <text x="280" y="410" fill="#d29922" font-size="10" font-weight="600">Prisma · Cache · Vector</text>

    <!-- ============ 基础设施层节点 ============ -->
    <g font-family="-apple-system, sans-serif" font-size="11" fill="#e6edf3">
      <rect x="30" y="460" width="140" height="55" rx="6" fill="#1a3d2e" stroke="#3fb950"/>
      <text x="100" y="480" text-anchor="middle" font-weight="600">Postgres</text>
      <text x="100" y="495" text-anchor="middle" fill="#8b949e" font-size="9">session · cost · report</text>
      <text x="100" y="507" text-anchor="middle" fill="#8b949e" font-size="9">+ pgvector</text>

      <rect x="200" y="460" width="140" height="55" rx="6" fill="#1a3d2e" stroke="#3fb950"/>
      <text x="270" y="480" text-anchor="middle" font-weight="600">Redis</text>
      <text x="270" y="495" text-anchor="middle" fill="#8b949e" font-size="9">实时成本追踪</text>
      <text x="270" y="507" text-anchor="middle" fill="#8b949e" font-size="9">+ Session 缓存</text>

      <rect x="370" y="460" width="140" height="55" rx="6" fill="#1a3d2e" stroke="#3fb950"/>
      <text x="440" y="480" text-anchor="middle" font-weight="600">Qdrant</text>
      <text x="440" y="495" text-anchor="middle" fill="#8b949e" font-size="9">向量检索</text>
      <text x="440" y="507" text-anchor="middle" fill="#8b949e" font-size="9">+ Semantic Cache</text>

      <rect x="540" y="460" width="140" height="55" rx="6" fill="#1a3d2e" stroke="#3fb950"/>
      <text x="610" y="480" text-anchor="middle" font-weight="600">Milvus</text>
      <text x="610" y="495" text-anchor="middle" fill="#8b949e" font-size="9">简历 · 面试题库</text>
      <text x="610" y="507" text-anchor="middle" fill="#8b949e" font-size="9">+ Milvus Etcd</text>

      <rect x="710" y="460" width="140" height="55" rx="6" fill="#1a3d2e" stroke="#3fb950"/>
      <text x="780" y="480" text-anchor="middle" font-weight="600">Langfuse</text>
      <text x="780" y="495" text-anchor="middle" fill="#8b949e" font-size="9">云端 SaaS</text>
      <text x="780" y="507" text-anchor="middle" fill="#8b949e" font-size="9">us.cloud.langfuse.com</text>

      <rect x="30" y="0" width="0" height="0"/>
    </g>

    <!-- 外部 LLM（右侧红色框） -->
    <rect x="870" y="460" width="110" height="55" rx="6" fill="#3d1a1a" stroke="#f85149"/>
    <text x="925" y="480" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">Qwen Plus</text>
    <text x="925" y="495" text-anchor="middle" fill="#8b949e" font-size="9">主模型</text>
    <text x="925" y="507" text-anchor="middle" fill="#8b949e" font-size="9">qwen-plus</text>

    <rect x="870" y="380" width="110" height="55" rx="6" fill="#3d1a1a" stroke="#f85149" stroke-dasharray="3,2"/>
    <text x="925" y="400" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">DeepSeek</text>
    <text x="925" y="415" text-anchor="middle" fill="#8b949e" font-size="9">备用</text>
    <text x="925" y="427" text-anchor="middle" fill="#f85149" font-size="9">402 已熔断</text>

    <!-- LLM 连线 -->
    <g stroke="#f85149" stroke-width="1.5" fill="none">
      <line x1="545" y1="278" x2="925" y2="460"/>
      <line x1="545" y1="278" x2="925" y2="380" stroke-dasharray="3,2"/>
    </g>
    <text x="755" y="395" fill="#f85149" font-size="10" font-weight="600">HTTPS</text>
  </svg>
</div>
</body>
</html>
