# ✅ 纯 Docker 化：一条命令起全部服务
# docker compose up -d --build
# 启动后：
#   - 前端: http://localhost:5173
#   - 后端: http://localhost:3001
#
# 容器清单（7 容器）：
#   postgres / redis / qdrant / milvus / milvus-etcd / api / web

services:
  postgres:
    image: postgres:16-alpine
    container_name: interview-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: interview
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dev']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: interview-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: interview-qdrant
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage

  # Milvus 2.x 依赖 etcd 做元数据存储
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: interview-milvus-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: '1000'
      ETCD_QUOTA_BACKEND_BYTES: '4294967296'
      ETCD_SNAPSHOT_COUNT: '50000'
    volumes:
      - milvus_etcd_data:/etcd
    command: etcd -advertise-client-urls=http://milvus-etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ['CMD', 'etcdctl', 'endpoint', 'health']
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s

  milvus:
    image: milvusdb/milvus:v2.4.17
    container_name: interview-milvus
    ports:
      - '19530:19530'
      - '9091:9091'
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      COMMON_STORAGETYPE: local
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      milvus-etcd:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9091/healthz']
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: interview-api
    ports:
      - '3001:3001'
    environment:
      # compose 内部用 service name
      DATABASE_URL: postgresql://dev:dev123@postgres:5432/interview
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      MILVUS_URL: http://milvus:19530
      NODE_ENV: production
      PORT: 3001
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/interview/stats']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: interview-web
    ports:
      - '5173:80'
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  milvus_etcd_data:
  milvus_data:
