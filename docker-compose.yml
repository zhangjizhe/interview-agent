# ✅ py 分支：默认 Python 后端（FastAPI · 与 NestJS 像素级等价）
#
# 一键启动（git clone 后只跑这一条）：
#   docker compose up -d --build
#
# 启动后：
#   - 前端: http://localhost:5173
#   - 后端: http://localhost:3001（Python · 默认）
#   - 文档: http://localhost:3001/docs（FastAPI 自动 OpenAPI）
#
# 容器清单（7 容器）：
#   postgres / redis / qdrant / milvus / milvus-etcd / api (Python) / web
#
# 切回 NestJS 后端：git checkout main → 同一条命令自动切换
#
# 必备前置（首次）：
#   cp .env.example .env  ← deploy.sh 会做
#   在 .env 填 QWEN_API_KEY（必须）+ JWT_SECRET（自动生成占位）

services:
  postgres:
    image: postgres:16-alpine
    container_name: interview-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: interview
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dev']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: interview-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: interview-qdrant
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ['CMD-SHELL', 'timeout 2 bash -c "</dev/tcp/localhost/6333" || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: interview-milvus-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: '1000'
      ETCD_QUOTA_BACKEND_BYTES: '4294967296'
      ETCD_SNAPSHOT_COUNT: '50000'
    volumes:
      - milvus_etcd_data:/etcd
    command: etcd -advertise-client-urls=http://milvus-etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ['CMD', 'etcdctl', 'endpoint', 'health']
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s

  milvus:
    image: milvusdb/milvus:v2.5.3
    command: ["milvus", "run", "standalone"]
    container_name: interview-milvus
    ports:
      - '19530:19530'
      - '9091:9091'
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      COMMON_STORAGETYPE: local
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      milvus-etcd:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9091/healthz']
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s

  # Python 后端（py 分支默认）
  api:
    build:
      context: .
      dockerfile: apps/py/Dockerfile
    container_name: interview-api
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dev}:${POSTGRES_PASSWORD:-dev123}@postgres:5432/interview
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      MILVUS_URL: http://milvus:19530
      QWEN_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      QWEN_MODEL: ${QWEN_MODEL:-qwen-plus}
      DEEPSEEK_BASE_URL: https://api.deepseek.com/v1
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      MEM0_API_KEY: ${MEM0_API_KEY:-}
      MEM0_HOST: ${MEM0_HOST:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env (deploy.sh 自动生成 dev 占位)}
      PORT: 3001
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      milvus:
        condition: service_healthy
    healthcheck:
      # Phase 1：裸 /health（在 /api 前缀之外）
      # Phase 2+：改 /api/health（与 NestJS 完全一致）
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://localhost:3001/health\").read()"']
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s
    restart: unless-stopped

  # 前端（自动连 api:3001，Python 还是 NestJS 都不变）
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: interview-web
    ports:
      - '5173:80'
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  milvus_etcd_data:
  milvus_data: