# ✅ 纯 Docker 化：真·一键部署（2026-06-26 NestJS 默认）
#
# 一键启动（git clone 后只跑这一条）：
#   docker compose up -d --build
#
# 启动后：
#   - 前端: http://localhost:5173
#   - 后端: http://localhost:3001（NestJS · 默认）
#   - 文档: http://localhost:3001/api/docs
#
# 容器清单（8 容器 · 2026-06-26 架构回退到 NestJS 默认）：
#   postgres / redis / qdrant / milvus / milvus-etcd / api (NestJS) / web
#   + py-api（默认不启，profile 选配）
#
# 选配启 py-api（薄壳版商用 best practice 后端）：
#   docker compose --profile py up -d
#   然后改 web/nginx.conf set $backend "http://py-api:3002" + 重 build web
#
# 必备前置（首次）：
#   cp .env.example .env  ← 自动生成（deploy.sh 会做）
#   在 .env 填 QWEN_API_KEY（必须）+ JWT_SECRET（自动生成占位）

services:
  postgres:
    image: postgres:16-alpine
    container_name: interview-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: interview
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      # P1-11 修复：商用必须从 .env 显式注入密码，未设置则用 dev 默认值（仅本地开发）
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dev']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: interview-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: interview-qdrant
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    # qdrant 镜像里没装 curl/wget，TCP 端口探测最稳
    healthcheck:
      test: ['CMD-SHELL', 'timeout 2 bash -c "</dev/tcp/localhost/6333" || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Milvus 2.x 依赖 etcd 做元数据存储
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: interview-milvus-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: '1000'
      ETCD_QUOTA_BACKEND_BYTES: '4294967296'
      ETCD_SNAPSHOT_COUNT: '50000'
    volumes:
      - milvus_etcd_data:/etcd
    command: etcd -advertise-client-urls=http://milvus-etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ['CMD', 'etcdctl', 'endpoint', 'health']
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s

  milvus:
    image: milvusdb/milvus:v2.5.3
    command: ["milvus", "run", "standalone"]
    container_name: interview-milvus
    ports:
      - '19530:19530'
      - '9091:9091'
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      COMMON_STORAGETYPE: local
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      milvus-etcd:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9091/healthz']
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s

  # NestJS 后端（2026-06-26 恢复为默认后端，端口 3001）
  # apps/api/（之前 apps/api-legacy/）git rename 回原路径
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: interview-api
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dev}:${POSTGRES_PASSWORD:-dev123}@postgres:5432/interview
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      MILVUS_URL: http://milvus:19530
      QWEN_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      QWEN_MODEL: ${QWEN_MODEL:-qwen-plus}
      DEEPSEEK_BASE_URL: https://api.deepseek.com/v1
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      MEM0_API_KEY: ${MEM0_API_KEY:-}
      MEM0_HOST: ${MEM0_HOST:-}
      # 商用 fail-fast：JWT_SECRET 未设置时 docker compose 立即报错（容器不启动）
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env (deploy.sh 自动生成 dev 占位)}
      PORT: 3001
      NODE_ENV: production
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      milvus:
        condition: service_healthy
    healthcheck:
      # node 18+ 内置 fetch，不依赖 curl
      # NestJS 用 setGlobalPrefix('api')，所以路径是 /api/health 不是 /health
      test: ['CMD-SHELL', "node -e \"fetch('http://localhost:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s
    restart: unless-stopped

  # Python 后端（选配 · 2026-06-26 改：默认不启，profile 启）
  # 用法：docker compose --profile py up -d
  # 之前是单后端，改为双后端并存：NestJS 默认 + py-api 选配
  py-api:
    build:
      context: .
      dockerfile: apps/py-api/Dockerfile
    container_name: interview-py-api
    profiles: ["py"]  # 只在 --profile py 时启动
    ports:
      - '3002:3002'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dev}:${POSTGRES_PASSWORD:-dev123}@postgres:5432/interview
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      MILVUS_URL: http://milvus:19530
      QWEN_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      MEM0_API_KEY: ${MEM0_API_KEY:-}
      MEM0_HOST: ${MEM0_HOST:-}
      # 商用 fail-fast：JWT_SECRET 未设置时 docker compose 立即报错（容器不启动）
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env (deploy.sh 自动生成 dev 占位)}
      PORT: 3002
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      milvus:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://localhost:3002/api/health\").read()"']
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s
    restart: unless-stopped

  # 前端（自动连 NestJS api:3001，py-api profile 启时改为 py-api:3002）
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: interview-web
    ports:
      - '5173:80'
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  milvus_etcd_data:
  milvus_data:
